name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build
        env:
          NODE_ENV: production
          VITE_APP_META_TITLE: ${{ vars.VITE_APP_META_TITLE }}
          VITE_APP_META_DESCRIPTION: ${{ vars.VITE_APP_META_DESCRIPTION }}
          VITE_APP_OG_IMAGE: ${{ vars.VITE_APP_OG_IMAGE }}
          VITE_APP_GSV: ${{ secrets.VITE_APP_GSV }}
          VITE_APP_GA: ${{ secrets.VITE_APP_GA }}
          VITE_APP_GA_ID: ${{ vars.VITE_APP_GA_ID }}
          VITE_APP_TWITTER: ${{ vars.VITE_APP_TWITTER }}
          VITE_APP_CANONICAL_URL: ${{ vars.VITE_APP_CANONICAL_URL }}
        run: node scripts/generate-sitemap.js && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
